services:

  # ────────────────────────────────────────────
  # Redis — BullMQ job queue backend
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scraper-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 160m
          cpus: "0.3"
        reservations:
          memory: 64m

  # ────────────────────────────────────────────
  # PostgreSQL — scraper data storage
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: scraper-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       scraper
      POSTGRES_USER:     scraper
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d scraper"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 128m

  # ────────────────────────────────────────────
  # Patchright Chromium — dedicated CDP server
  # ────────────────────────────────────────────
  browser:
    build:
      context: .
      target: browser-runner
    restart: unless-stopped
    shm_size: "2gb"
    security_opt:
      - seccomp:unconfined
    ports:
      - "127.0.0.1:9222:9222"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:9222/json/version',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  # ────────────────────────────────────────────
  # Browser automation + scraper API  (slim — no bundled Chromium)
  # ────────────────────────────────────────────
  full-tool-browser:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      BROWSER_DEFAULT_PROFILE: openclaw
      BROWSER_HEADLESS: "true"
      BROWSER_PROFILES_ROOT_DIR: /data/profiles
      BROWSER_ARTIFACT_DIR: /data/artifacts
      BROWSER_STATE_DIR: /data/state
      BROWSER_STEALTH: "true"
      # ── Database ──────────────────────────────
      DB_ENABLED:    "true"
      DB_HOST:       postgres
      DB_PORT:       "5432"
      DB_NAME:       scraper
      DB_USER:       scraper
      DB_PASSWORD:   ${DB_PASSWORD}
      # ── Redis / Queue ─────────────────────────
      REDIS_ENABLED: "true"
      REDIS_HOST:    redis
      REDIS_PORT:    "6379"
      # REDIS_PASSWORD: ""
      # ── Browser Pool ──────────────────────────
      BROWSER_POOL_SIZE:   "3"
      BROWSER_POOL_PREFIX: pool
      # ── MQTT (publish hasil ke CHR broker via WireGuard) ────────────────
      MQTT_ENABLED:      ${MQTT_ENABLED:-true}
      MQTT_BROKER_URL:   ${MQTT_BROKER_URL:-mqtt://10.10.0.1:1883}
      MQTT_USERNAME:     ${MQTT_USERNAME:-}
      MQTT_PASSWORD:     ${MQTT_PASSWORD:-}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-scraper/results}
      # ── API Security ──────────────────────────
      API_KEY:           ${API_KEY:-}
      # ── TikTok Growth OS Bridge ────────────────
      TIKTOK_GROWTH_OS_BRIDGE_ENABLED: ${TIKTOK_GROWTH_OS_BRIDGE_ENABLED:-false}
      TIKTOK_GROWTH_OS_MEMORY_DIR:     /data/skill-memory/tiktok
      # ── Browser CDP (connect ke browser-runner service) ───
      BROWSER_CDP_URL:   "http://browser:9222"
      BROWSER_SSRF_DANGEROUSLY_ALLOW_PRIVATE_NETWORK: "true"
      BROWSER_SSRF_HOSTNAME_ALLOWLIST: "itemku.com,www.itemku.com,shopee.co.id,www.shopee.co.id,tokopedia.com,www.tokopedia.com,bukalapak.com,www.bukalapak.com,lazada.co.id,www.lazada.co.id,tiktok.com,www.tiktok.com"
      # BROWSER_PROXY_SERVER: "http://host:port"
      # BROWSER_PROXY_USERNAME: ""
      # BROWSER_PROXY_PASSWORD: ""
    # DNS via PiHole di VPS CHR (aktif setelah WireGuard tunnel naik)
    dns:
      - 10.10.0.1   # PiHole via WireGuard
      - 1.1.1.1     # Fallback jika WireGuard down
    volumes:
      - ./data/profiles:/data/profiles
      - ./data/artifacts:/data/artifacts
      - ./data/state:/data/state
      - ${TIKTOK_GROWTH_OS_HOST_DIR:-/home/balibruntattour/.openclaw/workspace/memory/tiktok}:/data/skill-memory/tiktok
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      browser:
        condition: service_healthy

volumes:
  postgres-data:
