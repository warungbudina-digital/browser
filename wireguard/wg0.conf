[Interface]
# VPS Scraper — WireGuard client
Address = 10.10.0.2/24
PrivateKey = REPLACE_WITH_SCRAPER_PRIVATE_KEY

# DNS via PiHole di VPS CHR (memblokir tracking/analytics domain)
DNS = 10.10.0.1

# Routing: hanya traffic ke subnet WireGuard yang melalui tunnel
# Traffic internet tetap langsung (split tunnel)
# Ganti ke 0.0.0.0/0 jika ingin full tunnel (semua traffic via CHR)

[Peer]
# VPS CHR
PublicKey = REPLACE_WITH_CHR_PUBLIC_KEY
Endpoint = REPLACE_WITH_CHR_PUBLIC_IP:51820
AllowedIPs = 10.10.0.0/24
# Keepalive penting di client agar koneksi tetap hidup (NAT timeout)
PersistentKeepalive = 25
